<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actions & Stuff 1.11 - Ayufyz MCPE</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#0d1117;
      color:#fff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:800px;
      text-align:center;
    }

    .brand{
      font-size:2rem;
      font-weight:700;
      margin-bottom:25px;
    }

    .card{
      background:#161b22;
      border:1px solid #2b3240;
      border-radius:18px;
      padding:40px 30px;
    }

    .pack-name{
      font-size:2rem;
      margin-bottom:12px;
    }

    .version{
      color:#b9c0cc;
      margin-bottom:20px;
      font-size:1rem;
    }

    .download-btn{
      display:inline-block;
      text-decoration:none;
      background:#4ea1ff;
      color:#08111f;
      font-weight:700;
      font-size:1rem;
      padding:16px 60px;
      border-radius:12px;
      min-width:300px;
      transition:.2s;
    }

    .download-btn:hover{
      opacity:.9;
    }

    @media(max-width:600px){
      .download-btn{
        min-width:100%;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1 class="brand">Ayufyz MCPE</h1>

  <div class="card">
    <h2 class="pack-name">Actions & Stuff</h2>
    <p class="version">Version 1.11</p>

    <a href="https://gplinks.co/JntgII0W" class="download-btn">
      Download Pack
    </a>
  </div>

</div>

</body>
</html>
