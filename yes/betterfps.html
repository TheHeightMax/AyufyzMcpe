<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better FPS - Ayufyz MCPE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0d1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .brand {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .pack-box {
      background: #161b22;
      border: 1px solid #2b3240;
      border-radius: 18px;
      padding: 34px 24px;
    }

    .pack-name {
      font-size: 1.8rem;
      margin-bottom: 14px;
    }

    .pack-text {
      color: #b9c0cc;
      font-size: 1rem;
      margin-bottom: 26px;
    }

    .download-btn {
      display: inline-block;
      text-decoration: none;
      background: #4ea1ff;
      color: #08111f;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 34px;
      border-radius: 12px;
      min-width: 240px;
      transition: opacity 0.2s ease;
    }

    .download-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1 class="brand">Ayufyz MCPE</h1>

    <div class="pack-box">
      <h2 class="pack-name">Sodium</h2>
      <p class="pack-text">Download the Better FPS texture pack for Minecraft Bedrock / MCPE.</p>
      <a href="https://gplinks.co/CHdRqbXu" class="download-btn">Download Pack</a>
    </div>
  </div>
</body>
</html>
